version: '3.8'

services:

  db:
    image: mysql:5.7
    container_name: wordpress_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wordpress
      MYSQL_USER: aaron
      MYSQL_PASSWORD: 1234
    volumes:
      - db_data:/var/lib/mysql

  wordpress:
    image: wordpress:latest
    container_name: wordpress_app
    depends_on:
      - db
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: aaron
      WORDPRESS_DB_PASSWORD: wp
      WORDPRESS_DB_NAME: 1234
    volumes:
      - ./src:/var/www/html

  git:
    image: alpine/git
    container_name: git_sync
    volumes:
      - ./src:/repo
    working_dir: /repo
    command: >
      sh -c "if [ ! -d .git ]; then git clone https://github.com/TU_USUARIO/TU_REPO.git .; fi"

volumes:
  db_data:
